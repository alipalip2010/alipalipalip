<!DOCTYPE html>

        .container {

        }

        .btn button {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            background: lightgreen;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        .progress {
            background: black;
            border-radius: 10px;
            margin: 10px 0;
        }

        .progress-bar {
            height: 10px;
            background: green;
            border-radius: 10px;
        }
    </style>
</head>
